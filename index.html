<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google</title>
    <link rel="stylesheet" href="styles.css">
  </head>

  <body>
    <div class="top">

        <div class="tleft">
            <a class="about" href="https://about.google/?utm_source=google-NL&utm_medium=referral&utm_campaign=hp-footer&fg=1">About</a>
            <a class="store" href="https://store.google.com/">Help</a>
        </div>

        <div class="tright">
            <a class="gmail" href="https://mail.google.com/mail/&ogbl">Gmail</a>
            <a class="images" href="https://www.google.com/imghp?hl=en&ogbl">Images</a>
            <img class="dots" src="https://png.pngtree.com/png-vector/20220726/ourmid/pngtree-ui-icon-in-dark-mode-three-dots-menu-glyph-vector-png-image_47716902.jpg">
            <img class="pfp" src="https://i.pinimg.com/736x/2c/5c/30/2c5c30a58c233c1a2c4e728106356700.jpg">

        </div>
    </div>
    <div class="middle">

        <img class="logo" src="https://pngimg.com/uploads/google/google_PNG19644.png">

        <form class="input" action="https://www.google.com/search">
            <input class="searchbar" type="text" id="search" name="q" placeholder="search">
        </form>

    </div>
    <script src="script.js"></script>
  </body>
</html>
